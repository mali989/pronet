version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pronet
      POSTGRES_USER: pronet
      POSTGRES_PASSWORD: pronet_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pronet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pronet -d pronet"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://pronet:pronet_password@postgres:5432/pronet
      PORT: 3001
      FRONTEND_URL: http://localhost
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pronet-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pronet-network

networks:
  pronet-network:
    driver: bridge

volumes:
  postgres_data:
